<dialog class="modal modal-open" role="dialog" aria-modal="true" aria-labelledby="filter-title">
  <div class="modal-box max-w-lg">
    <h2 id="filter-title" class="text-lg font-bold">Select Filters</h2>

    <form [formGroup]="form" class="space-y-6 mt-6" (ngSubmit)="submit()">
      <fieldset class="space-y-2">
        <legend class="font-semibold">Select gender</legend>

        <div class="flex items-center gap-3">
          <button
            type="button"
            class="btn btn-square btn-sm"
            (click)="resetGender()"
            aria-label="Clear gender selection"
          >
            x
          </button>

          <input type="radio" class="btn" value="male" formControlName="gender" aria-label="Male" />

          <input
            type="radio"
            class="btn"
            value="female"
            formControlName="gender"
            aria-label="Female"
          />
        </div>
      </fieldset>

      <div class="space-y-2">
        <label for="minAge" class="font-semibold block"> Select age </label>

        <div class="flex gap-3">
          <input
            id="minAge"
            type="number"
            class="input input-bordered w-24"
            formControlName="minAge"
            min="18"
            aria-describedby="age-error"
          />

          <input
            type="number"
            class="input input-bordered w-24"
            formControlName="maxAge"
            [min]="form.value.minAge || 18"
            aria-describedby="age-error"
          />
        </div>

        @if (isAgeInvalid()) {
          <p id="age-error" class="text-error text-sm">
            Max age must be greater than or equal to min age.
          </p>
        }
      </div>

      <div class="space-y-2">
        <label for="orderBy" class="font-semibold block"> Order by </label>

        <select id="orderBy" class="select select-bordered w-full" formControlName="orderBy">
          <option value="lastActive">Last active</option>
          <option value="created">Newest members</option>
        </select>
      </div>

      <div class="modal-action">
        <button type="submit" class="btn btn-primary">Apply Filters</button>
        <button type="button" class="btn btn-ghost" (click)="close()">Cancel</button>
      </div>
    </form>
  </div>
</dialog>
