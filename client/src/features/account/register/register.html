<div class="card bg-base-100 min-w-xl mx-auto flex flex-col p-6 rounded-lg shadow-lg">
  <div class="card-title justify-center text-3xl text-primary">Sign up</div>

  <div class="card-body w-full">
    <form [formGroup]="registerForm" class="flex flex-col gap-4 w-full" (ngSubmit)="register()">
      <app-text-input label="Email" formControlName="email"> </app-text-input>
      <app-text-input label="Display name" formControlName="displayName" />
      <app-text-input label="Password" type="password" formControlName="password"> </app-text-input>
      <app-text-input label="Confirm Password" type="password" formControlName="confirmPassword">
      </app-text-input>

      <div class="flex items-center justify-end gap-3">
        <button type="button" class="btn" (click)="handleShowForm()">Cancel</button>
        <button [disabled]="registerForm.invalid" type="submit" class="btn btn-primary">
          Register
        </button>
      </div>
    </form>
  </div>

  <!-- Debugging form state -->
  <div class="flex flex-col w-full mockup-code text-lg items-start px-2">
    <div>Form value: {{ registerForm.value | json }}</div>
    <div>Form status: {{ registerForm.status }}</div>
  </div>
</div>
